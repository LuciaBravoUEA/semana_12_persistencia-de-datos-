{% extends "base.html" %}
{% block content %}
<h2>Editar Producto</h2>

<form method="POST">
    <label for="producto">Producto:</label>
    <input type="text" id="producto" name="producto" value="{{ producto[1] }}" required><br><br>

    <label for="precio">Precio:</label>
    <input type="number" step="0.01" id="precio" name="precio" value="{{ producto[2] }}" required><br><br>

    <label for="cantidad">Cantidad:</label>
    <input type="number" id="cantidad" name="cantidad" value="{{ producto[3] }}" required><br><br>

    <button type="submit">Guardar cambios</button>
</form>

<p style="margin-top:20px;">
    <a href="/inventario">Volver al Inventario</a>
</p>
{% endblock %}
