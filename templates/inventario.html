{% extends "base.html" %}
{% block content %}
<h1 class="titulo-principal">Inventario de Productos</h1>

<!-- Formulario para agregar -->
<form method="POST" action="/agregar" style="margin-bottom:20px;">
    <input type="text" name="producto" placeholder="Producto" required>
    <input type="number" step="0.01" name="precio" placeholder="Precio" required>
    <input type="number" name="cantidad" placeholder="Cantidad" required>
    <button type="submit">Agregar</button>
</form>

<!-- Tabla de inventario -->
<table border="1" style="width:80%; margin:auto;">
    <tr>
        <th>ID</th>
        <th>Producto</th>
        <th>Precio</th>
        <th>Cantidad</th>
        <th>Acciones</th>
    </tr>
    {% for p in productos %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>
        <td>
            <a href="/editar/{{ p[0] }}">Editar</a> |
            <a href="/eliminar/{{ p[0] }}">Eliminar</a> |
            <a href="/buscar/{{ p[0] }}">Buscar</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
