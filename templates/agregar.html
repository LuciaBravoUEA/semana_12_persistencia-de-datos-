{% extends "base.html" %}
{% block content %}
<h2>Agregar Producto</h2>

<form method="POST" action="/agregar">
    <label for="producto">Producto:</label>
    <input type="text" id="producto" name="producto" placeholder="Nombre del producto" required><br><br>

    <label for="precio">Precio:</label>
    <input type="number" step="0.01" id="precio" name="precio" placeholder="Precio" required><br><br>

    <label for="cantidad">Cantidad:</label>
    <input type="number" id="cantidad" name="cantidad" placeholder="Cantidad" required><br><br>

    <button type="submit">Agregar</button>
</form>

<p style="margin-top:20px;">
    <a href="/inventario">Volver al Inventario</a>
</p>
{% endblock %}
